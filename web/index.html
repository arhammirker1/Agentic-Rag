<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PageIndex — Vectorless RAG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--primary:#cc785c;--primary-active:#a9583e;--primary-disabled:#e6dfd8;--ink:#141413;--body:#3d3d3a;--body-strong:#252523;--muted:#6c6a64;--muted-soft:#8e8b82;--hairline:#e6dfd8;--canvas:#faf9f5;--surface-soft:#f5f0e8;--surface-card:#efe9de;--surface-dark:#181715;--surface-dark-el:#252320;--on-primary:#fff;--on-dark:#faf9f5;--on-dark-soft:#a09d96;--success:#5db872;--error:#c64545;--serif:"Cormorant Garamond","Times New Roman",serif;--sans:"Inter",-apple-system,sans-serif;--mono:"JetBrains Mono",monospace;--r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-pill:9999px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);font-size:15px;line-height:1.55;color:var(--body);background:var(--canvas)}
button{cursor:pointer;font-family:var(--sans);border:none;font-size:14px;font-weight:500}
input,textarea{font-family:var(--sans);font-size:15px;outline:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--hairline);border-radius:3px}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:260px;min-width:260px;background:var(--surface-soft);border-right:1px solid var(--hairline);display:flex;flex-direction:column;transition:.2s}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#sources-panel{width:280px;min-width:280px;background:var(--canvas);border-left:1px solid var(--hairline);display:flex;flex-direction:column;overflow-y:auto;transition:.2s}

/* Sidebar */
.sb-header{padding:20px 20px 16px;border-bottom:1px solid var(--hairline)}
.sb-logo{font-family:var(--serif);font-size:24px;font-weight:400;color:var(--ink);letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.sb-logo span{color:var(--primary)}
.sb-list{flex:1;overflow-y:auto;padding:8px}
.sb-item{padding:10px 14px;border-radius:var(--r-md);cursor:pointer;color:var(--body);font-size:14px;display:flex;align-items:center;gap:8px;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item:hover{background:var(--surface-card)}
.sb-item.active{background:var(--surface-card);color:var(--ink);font-weight:500}
.sb-item .dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0}
.sb-item .del{margin-left:auto;opacity:0;color:var(--muted);font-size:16px;flex-shrink:0}
.sb-item:hover .del{opacity:1}
.sb-footer{padding:12px}
.btn-new{width:100%;padding:10px;border-radius:var(--r-md);background:var(--primary);color:var(--on-primary);font-weight:500;transition:.15s}
.btn-new:hover{background:var(--primary-active)}

/* Top bar */
#topbar{height:52px;min-height:52px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;padding:0 20px;gap:12px}
#topbar h2{font-family:var(--serif);font-size:20px;font-weight:400;color:var(--ink);letter-spacing:-0.3px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-icon{width:36px;height:36px;border-radius:50%;background:var(--surface-soft);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.15s;font-size:18px}
.btn-icon:hover{background:var(--surface-card);color:var(--ink)}

/* Chat */
#chat-area{flex:1;overflow-y:auto;padding:24px 32px}
.msg{margin-bottom:20px;max-width:800px}
.msg.user{margin-left:auto}
.msg-role{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;color:var(--muted)}
.msg-body{padding:14px 18px;border-radius:var(--r-lg);line-height:1.6;font-size:15px}
.msg.user .msg-body{background:var(--surface-dark);color:var(--on-dark);border-bottom-right-radius:4px}
.msg.assistant .msg-body{background:var(--surface-card);color:var(--ink);border-bottom-left-radius:4px}
.msg-meta{font-size:12px;color:var(--muted-soft);margin-top:6px;display:flex;gap:12px}
.msg-body h1,.msg-body h2,.msg-body h3{font-family:var(--serif);font-weight:400;margin:12px 0 6px;color:var(--ink)}
.msg-body h2{font-size:18px} .msg-body h3{font-size:16px}
.msg-body ul,.msg-body ol{padding-left:20px;margin:6px 0}
.msg-body li{margin:3px 0}
.msg-body strong{color:var(--ink);font-weight:600}
.msg-body code{font-family:var(--mono);font-size:13px;background:var(--surface-soft);padding:2px 5px;border-radius:3px}
.msg-body p{margin:8px 0}

/* Input */
#input-area{padding:16px 32px 20px;border-top:1px solid var(--hairline)}
#input-wrap{display:flex;gap:10px;max-width:800px}
#input-wrap textarea{flex:1;padding:12px 16px;border:1px solid var(--hairline);border-radius:var(--r-md);resize:none;min-height:44px;max-height:120px;background:var(--canvas);color:var(--ink);transition:.15s}
#input-wrap textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(204,120,92,.12)}
#btn-send{padding:0 20px;background:var(--primary);color:var(--on-primary);border-radius:var(--r-md);font-weight:500;transition:.15s;white-space:nowrap}
#btn-send:hover{background:var(--primary-active)}
#btn-send:disabled{background:var(--primary-disabled);color:var(--muted);cursor:default}

/* Sources panel */
.sp-header{padding:16px 20px;border-bottom:1px solid var(--hairline)}
.sp-header h3{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--ink);letter-spacing:-0.3px}
.sp-list{flex:1;overflow-y:auto;padding:12px}
.sp-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-md);background:var(--surface-card);margin-bottom:8px}
.sp-icon{font-size:22px;flex-shrink:0}
.sp-info{flex:1;overflow:hidden}
.sp-name{font-size:13px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-size{font-size:11px;color:var(--muted-soft)}
.sp-del{color:var(--muted);font-size:14px;opacity:0;transition:.15s;background:none}
.sp-item:hover .sp-del{opacity:1}
.sp-upload{margin:12px}
#drop-zone{border:2px dashed var(--hairline);border-radius:var(--r-lg);padding:24px 16px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:.2s}
#drop-zone:hover,#drop-zone.drag{border-color:var(--primary);background:rgba(204,120,92,.04);color:var(--primary)}
#drop-zone input{display:none}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;color:var(--muted)}
.empty-state h2{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--ink);letter-spacing:-0.5px;margin-bottom:8px}
.empty-state p{max-width:400px;line-height:1.6}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,20,19,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:.2s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--canvas);border-radius:var(--r-xl);padding:28px;width:420px;max-width:90vw;box-shadow:0 8px 32px rgba(20,20,19,.15)}
.modal h2{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--ink);margin-bottom:16px;letter-spacing:-0.3px}
.modal label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:4px;margin-top:14px}
.modal input,.modal select{width:100%;padding:10px 14px;border:1px solid var(--hairline);border-radius:var(--r-md);background:var(--canvas);color:var(--ink);font-size:14px}
.modal input:focus,.modal select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(204,120,92,.12)}
.modal-btns{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;border-radius:var(--r-md);background:var(--surface-card);color:var(--ink)}
.btn-save{padding:10px 20px;border-radius:var(--r-md);background:var(--primary);color:var(--on-primary)}
.btn-save:hover{background:var(--primary-active)}

/* Loading */
.typing{display:inline-flex;gap:4px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:blink 1.2s infinite;opacity:0.6}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1.1)}}
.loading-bubble{display:flex;flex-direction:column;gap:8px;padding:14px 18px;background:var(--surface-card);border-radius:var(--r-lg);border-bottom-left-radius:4px;width:fit-content}
.loading-status{font-size:12px;color:var(--muted-soft);font-weight:500;letter-spacing:0.5px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface-dark);color:var(--on-dark);padding:10px 24px;border-radius:var(--r-pill);font-size:13px;font-weight:500;z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

/* Pipeline Trace */
.trace-toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;margin-top:8px;border-radius:var(--r-md);background:var(--surface-soft);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:.15s;border:1px solid var(--hairline)}
.trace-toggle:hover{background:var(--surface-card);color:var(--ink)}
.trace-toggle .arrow{transition:transform .2s;display:inline-block;font-size:10px}
.trace-toggle.open .arrow{transform:rotate(90deg)}
.trace-panel{display:none;margin-top:8px;padding:14px 16px;border-radius:var(--r-lg);background:var(--surface-dark);color:var(--on-dark);font-size:13px;font-family:var(--mono);line-height:1.7;max-height:400px;overflow-y:auto}
.trace-panel.show{display:block}
.trace-panel .tr-section{margin-bottom:10px}
.trace-panel .tr-label{color:var(--primary);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.trace-panel .tr-step{color:var(--on-dark-soft);padding-left:12px;border-left:2px solid var(--surface-dark-el);margin:2px 0}
.trace-panel .tr-step.hunter{border-left-color:#5db872}
.trace-panel .tr-step.evaluator{border-left-color:#cc785c}
.trace-panel .tr-step.synthesizer{border-left-color:#6b9ed6}
.trace-panel .tr-step.critic{border-left-color:#c6a145}
.trace-panel .tr-step.planner{border-left-color:#b07cc6}
.trace-stats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.trace-stat{padding:4px 10px;border-radius:var(--r-pill);background:var(--surface-dark-el);font-size:11px;font-family:var(--sans);font-weight:500;color:var(--on-dark-soft)}
.trace-stat .val{color:var(--on-dark);font-weight:600}
.trace-halluc{background:rgba(198,69,69,.15);color:#e88;padding:8px 12px;border-radius:var(--r-md);margin-top:6px;font-family:var(--sans);font-size:12px}

@media(max-width:900px){#sidebar{width:0;min-width:0;overflow:hidden}#sources-panel{width:0;min-width:0;overflow:hidden}}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-header"><div class="sb-logo"><span>&#10038;</span> PageIndex</div></div>
    <div class="sb-list" id="nb-list"></div>
    <div class="sb-footer"><button class="btn-new" onclick="showNewNb()">+ New Notebook</button></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <h2 id="nb-title">PageIndex</h2>
      <button class="btn-icon" onclick="showSettings()" title="Settings">&#9881;</button>
    </div>
    <div id="chat-area">
      <div class="empty-state" id="empty-main">
        <h2>Welcome to PageIndex</h2>
        <p>Create a notebook and upload PDF documents to start asking questions. No vectors, no embeddings — pure reasoning-based retrieval.</p>
      </div>
    </div>
    <div id="input-area" style="display:none">
      <div id="input-wrap">
        <textarea id="q-input" placeholder="Ask a question about your documents..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button id="btn-send" onclick="sendMsg()">Ask</button>
      </div>
    </div>
  </div>

  <!-- Sources -->
  <div id="sources-panel" style="display:none">
    <div class="sp-header"><h3>Sources</h3></div>
    <div class="sp-list" id="src-list"></div>
    <div class="sp-upload">
      <div id="drop-zone" onclick="document.getElementById('file-input').click()" ondrop="handleDrop(event)" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')">
        Drop PDFs here or click to upload
        <input type="file" id="file-input" accept=".pdf" multiple onchange="uploadFiles(this.files)">
      </div>
    </div>
  </div>
</div>

<!-- New Notebook Modal -->
<div class="modal-bg" id="modal-new">
  <div class="modal">
    <h2>New Notebook</h2>
    <label>Name</label>
    <input id="nb-name-input" placeholder="e.g. Research Papers" onkeydown="if(event.key==='Enter')createNb()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="hideModal('modal-new')">Cancel</button>
      <button class="btn-save" onclick="createNb()">Create</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="modal-settings">
  <div class="modal">
    <h2>Settings</h2>
    <label>Provider</label>
    <select id="s-provider" onchange="toggleProvider()">
      <option value="groq">Groq Cloud (free)</option>
      <option value="gemini">Google Gemini (High Limits)</option>
      <option value="local">Local LLM (Ollama / LM Studio)</option>
    </select>
    <label>Model</label>
    <select id="s-model"></select>
    <div id="s-local-fields" style="display:none">
      <label>Base URL</label>
      <input id="s-url" placeholder="http://localhost:11434/v1">
      <label style="display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer">
        <input type="checkbox" id="s-thinking" style="width:16px;height:16px;margin:0"> 
        <span>Enable Deep Thinking mode (slower but better reasoning)</span>
      </label>
    </div>
    <label>API Key <span style="font-weight:400;color:var(--muted-soft)">(leave empty to use env var)</span></label>
    <input id="s-key" type="password" placeholder="gsk_...">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="hideModal('modal-settings')">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentNb=null,notebooks=[],groqModels=[],localModels=[],geminiModels=[];

// API helpers
async function api(url,opts={}){const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opts});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||r.statusText)}return r.json()}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function showModal(id){document.getElementById(id).classList.add('show')}
function hideModal(id){document.getElementById(id).classList.remove('show')}

// Notebooks
async function loadNotebooks(){
  notebooks=await api('/api/notebooks');
  const el=document.getElementById('nb-list');
  el.innerHTML=notebooks.map(n=>`<div class="sb-item${currentNb&&currentNb.id===n.id?' active':''}" onclick="selectNb('${n.id}')"><span class="dot"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis">${esc(n.name)}</span><span class="del" onclick="event.stopPropagation();deleteNb('${n.id}')">&times;</span></div>`).join('');
  if(!notebooks.length)el.innerHTML='<div style="padding:20px;color:var(--muted);font-size:13px;text-align:center">No notebooks yet</div>';
}

function showNewNb(){showModal('modal-new');setTimeout(()=>document.getElementById('nb-name-input').focus(),100)}

async function createNb(){
  const name=document.getElementById('nb-name-input').value.trim();
  if(!name)return;
  const nb=await api('/api/notebooks',{method:'POST',body:JSON.stringify({name})});
  hideModal('modal-new');document.getElementById('nb-name-input').value='';
  await loadNotebooks();selectNb(nb.id);toast('Notebook created');
}

async function deleteNb(id){
  if(!confirm('Delete this notebook?'))return;
  await api(`/api/notebooks/${id}`,{method:'DELETE'});
  if(currentNb&&currentNb.id===id)currentNb=null;
  await loadNotebooks();renderMain();
}

async function selectNb(id){
  currentNb=notebooks.find(n=>n.id===id);
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  await loadNotebooks();renderMain();await loadSources();
}

// Sources
async function loadSources(){
  if(!currentNb)return;
  const sources=await api(`/api/notebooks/${currentNb.id}/sources`);
  currentNb.sources=sources;
  const el=document.getElementById('src-list');
  el.innerHTML=sources.map(s=>`<div class="sp-item"><span class="sp-icon">&#128196;</span><div class="sp-info"><div class="sp-name">${esc(s.name)}</div><div class="sp-size">${fmtSize(s.size)}</div></div><button class="sp-del" onclick="delSource('${esc(s.name)}')">&times;</button></div>`).join('');
  if(!sources.length)el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No sources yet.<br>Upload PDFs to get started.</div>';
}

async function uploadFiles(files){
  if(!currentNb)return;
  for(const f of files){
    if(!f.name.toLowerCase().endsWith('.pdf')){toast('Only PDFs allowed');continue}
    const fd=new FormData();fd.append('file',f);
    await fetch(`/api/notebooks/${currentNb.id}/sources`,{method:'POST',body:fd});
  }
  document.getElementById('file-input').value='';
  await loadSources();await loadNotebooks();toast('Uploaded');
}

function handleDrop(e){e.preventDefault();e.currentTarget.classList.remove('drag');uploadFiles(e.dataTransfer.files)}

async function delSource(name){
  if(!currentNb)return;
  await api(`/api/notebooks/${currentNb.id}/sources/${encodeURIComponent(name)}`,{method:'DELETE'});
  await loadSources();toast('Removed');
}

// Chat
function renderMain(){
  const chat=document.getElementById('chat-area');
  const input=document.getElementById('input-area');
  const sp=document.getElementById('sources-panel');
  const title=document.getElementById('nb-title');
  const empty=document.getElementById('empty-main');
  if(!currentNb){
    title.textContent='PageIndex';input.style.display='none';sp.style.display='none';
    chat.innerHTML='';empty.style.display='';chat.appendChild(empty);return;
  }
  title.textContent=currentNb.name;input.style.display='';sp.style.display='';
  if(!chat.querySelector('.msg'))chat.innerHTML='<div class="empty-state" id="empty-chat"><h2>Start a conversation</h2><p>Upload documents in the Sources panel, then ask questions about them.</p></div>';
}

async function sendMsg(){
  const inp=document.getElementById('q-input');
  const q=inp.value.trim();if(!q||!currentNb)return;
  inp.value='';inp.style.height='auto';
  const ec=document.getElementById('empty-chat');if(ec)ec.remove();
  const em=document.getElementById('empty-main');if(em)em.style.display='none';

  // User message
  appendMsg('user',q);

  // Loading
  const lid='load-'+Date.now();
  const chat=document.getElementById('chat-area');
  const ldiv=document.createElement('div');ldiv.id=lid;ldiv.className='msg assistant';
  ldiv.innerHTML=`
    <div class="msg-role">PageIndex</div>
    <div class="loading-bubble">
      <div class="typing"><span></span><span></span><span></span></div>
      <div class="loading-status">Reasoning & Searching...</div>
    </div>
  `;
  chat.appendChild(ldiv);chat.scrollTop=chat.scrollHeight;

  document.getElementById('btn-send').disabled=true;
  try{
    const r=await api(`/api/notebooks/${currentNb.id}/chat`,{method:'POST',body:JSON.stringify({message:q})});
    ldiv.remove();
    appendMsg('assistant',r.answer,r);
  }catch(e){ldiv.remove();appendMsg('assistant','Error: '+e.message);
  }finally{document.getElementById('btn-send').disabled=false}
}

function appendMsg(role,text,meta){
  const chat=document.getElementById('chat-area');
  const d=document.createElement('div');d.className='msg '+role;
  let metaHtml='';
  let traceHtml='';
  if(meta){
    const parts=[];
    if(meta.confidence!=null)parts.push(`Confidence: ${Math.round(meta.confidence*100)}%`);
    if(meta.elapsed)parts.push(`${meta.elapsed.toFixed(1)}s`);
    if(meta.sources)parts.push(`${meta.sources.length} sources`);
    if(meta.documents_searched)parts.push(`${meta.documents_searched.length} docs searched`);
    if(meta.was_rewritten)parts.push('\u2714 Critic-verified');
    metaHtml=`<div class="msg-meta">${parts.join(' &middot; ')}</div>`;

    // Build pipeline trace
    const tid='trace-'+Date.now();
    const trace=meta.reasoning_trace||[];
    const halluc=meta.hallucinations||[];

    // Count rounds
    const rounds=new Set();
    trace.forEach(s=>{const m=s.match(/:R(\d+)/);if(m)rounds.add(m[1])});
    const nRounds=rounds.size||1;

    // Stats bar
    let statsHtml='<div class="trace-stats">';
    statsHtml+=`<div class="trace-stat">Rounds: <span class="val">${nRounds}</span></div>`;
    if(meta.confidence!=null)statsHtml+=`<div class="trace-stat">Confidence: <span class="val">${Math.round(meta.confidence*100)}%</span></div>`;
    if(meta.elapsed)statsHtml+=`<div class="trace-stat">Time: <span class="val">${meta.elapsed.toFixed(1)}s</span></div>`;
    if(meta.sources)statsHtml+=`<div class="trace-stat">Chunks: <span class="val">${meta.sources.length}</span></div>`;
    if(meta.documents_searched)statsHtml+=`<div class="trace-stat">Docs: <span class="val">${meta.documents_searched.length}</span></div>`;
    statsHtml+=`<div class="trace-stat">Rewritten: <span class="val">${meta.was_rewritten?'Yes':'No'}</span></div>`;
    statsHtml+='</div>';

    // Steps
    let stepsHtml='';
    if(trace.length){
      stepsHtml='<div class="tr-section"><div class="tr-label">Pipeline Steps</div>';
      trace.forEach(s=>{
        let cls='planner';
        if(s.includes('[Hunter'))cls='hunter';
        else if(s.includes('[Synthesizer'))cls='synthesizer';
        else if(s.includes('[Evaluator'))cls='evaluator';
        else if(s.includes('[Critic'))cls='critic';
        stepsHtml+=`<div class="tr-step ${cls}">${esc(s)}</div>`;
      });
      stepsHtml+='</div>';
    }

    // Sources detail
    let srcHtml='';
    if(meta.sources&&meta.sources.length){
      srcHtml='<div class="tr-section"><div class="tr-label">Sources Used</div>';
      meta.sources.forEach((s,i)=>{
        srcHtml+=`<div class="tr-step hunter">${i+1}. ${esc(s.section||'?')} (${esc(s.doc_title||s.doc_id||'?').substring(0,60)}, pages ${s.pages||'?'})</div>`;
      });
      srcHtml+='</div>';
    }

    // Hallucinations
    let hallucHtml='';
    if(halluc.length){
      hallucHtml='<div class="tr-section"><div class="tr-label">Hallucinations Detected</div>';
      halluc.forEach(h=>{
        hallucHtml+=`<div class="trace-halluc"><strong>${esc(h.claim||'?')}</strong><br>${esc(h.reason||'')}</div>`;
      });
      hallucHtml+='</div>';
    }

    traceHtml=`
      <button class="trace-toggle" onclick="this.classList.toggle('open');document.getElementById('${tid}').classList.toggle('show')">
        <span class="arrow">&#9654;</span> Pipeline Trace (${trace.length} steps, ${nRounds} round${nRounds>1?'s':''})
      </button>
      <div class="trace-panel" id="${tid}">
        ${statsHtml}
        ${stepsHtml}
        ${srcHtml}
        ${hallucHtml}
      </div>
    `;
  }
  d.innerHTML=`<div class="msg-role">${role==='user'?'You':'PageIndex'}</div><div class="msg-body">${renderMd(text)}</div>${metaHtml}${traceHtml}`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}

// Simple markdown renderer
function renderMd(t){
  t=esc(t);
  t=t.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  t=t.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  t=t.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/^\s*[-*] (.+)$/gm,'<li>$1</li>');
  t=t.replace(/(<li>.*<\/li>)/s,m=>'<ul>'+m+'</ul>');
  t=t.replace(/\n{2,}/g,'</p><p>');
  t='<p>'+t+'</p>';
  t=t.replace(/<p><(h[123]|ul|ol)/g,'<$1');
  t=t.replace(/<\/(h[123]|ul|ol)><\/p>/g,'</$1>');
  return t;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(0)+' KB';return(b/1048576).toFixed(1)+' MB'}

// Settings
async function showSettings(){
  const s=await api('/api/settings');const m=await api('/api/models');
  groqModels=m.groq;localModels=m.local||m.local_examples;geminiModels=m.gemini||[];
  document.getElementById('s-provider').value=s.provider||'groq';
  document.getElementById('s-url').value=s.base_url||'';
  document.getElementById('s-thinking').checked=s.enable_thinking||false;
  document.getElementById('s-key').value='';
  toggleProvider();
  const sel=document.getElementById('s-model');
  setTimeout(()=>{sel.value=s.model||''},50);
  showModal('modal-settings');
}

function toggleProvider(){
  const p=document.getElementById('s-provider').value;
  document.getElementById('s-local-fields').style.display=p==='local'?'':'none';
  const sel=document.getElementById('s-model');
  const models=p==='local'?localModels:p==='gemini'?geminiModels:groqModels;
  sel.innerHTML=models.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
}

async function saveSettings(){
  await api('/api/settings',{method:'POST',body:JSON.stringify({
    provider:document.getElementById('s-provider').value,
    model:document.getElementById('s-model').value,
    api_key:document.getElementById('s-key').value,
    base_url:document.getElementById('s-url').value,
    enable_thinking:document.getElementById('s-thinking').checked,
  })});
  hideModal('modal-settings');toast('Settings saved');
}

document.getElementById('q-input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});

// Init
loadNotebooks();
